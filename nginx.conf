# ── Rate Limiting Zones (in http context via conf.d) ──
# Login: max 5 requests/minute per IP (brute force protection)
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
# API general: max 60 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;
# Public pages: max 120 requests/minute per IP
limit_req_zone $binary_remote_addr zone=general_zone:20m rate=120r/m;

upstream nextjs_upstream {
    server localhost:3002;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Logs ──
    access_log /var/log/nginx/infosistel_access.log;
    error_log  /var/log/nginx/infosistel_error.log warn;

    # ── Hide Nginx version (info leakage) ──
    server_tokens off;

    # ── Request body size limit (5MB for image uploads) ──
    client_max_body_size 5m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ── Gzip Compression ──
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ── Security Headers (applied to all responses) ──
    add_header X-Frame-Options            "SAMEORIGIN"                           always;
    add_header X-Content-Type-Options     "nosniff"                              always;
    add_header X-XSS-Protection           "1; mode=block"                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ── Block access to sensitive files ──
    location ~ /\.(env|git|sh|sql|log)$ {
        deny all;
        return 404;
    }
    location ~ \.(mjs|ts|prisma)$ {
        deny all;
        return 404;
    }

    # ── /api/auth/login — strict rate limit: 5/min, burst 2 ──
    location = /api/auth/login {
        limit_req zone=login_zone burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # ── /api/* — general API rate limit ──
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Next.js static assets — long-lived cache (immutable hashes) ──
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ── Public images & uploads — 30-day cache ──
    location ~* ^/(img|uploads|favicon)/ {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
    }

    # ── General proxy → Next.js ──
    location / {
        limit_req zone=general_zone burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # ── Custom error pages ──
    error_page 429 @rate_limited;
    location @rate_limited {
        add_header Content-Type "application/json" always;
        return 429 '{"error":"Demasiadas solicitudes. Intenta de nuevo en unos minutos."}';
    }
}
