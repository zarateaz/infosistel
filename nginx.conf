upstream nextjs_upstream {
    server localhost:3000;
}

# HTTP server - Redirect all traffic to HTTPS (Recommended for Production)
server {
    listen 80;
    listen [::]:80;
    server_name infosistel.com www.infosistel.com;
    
    # Security header to allow ACME challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.infosistel.com$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.infosistel.com;

    # SSL Configuration (Certbot paths)
    ssl_certificate /etc/letsencrypt/live/www.infosistel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.infosistel.com/privkey.pem;
    
    # Modern SSL Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers - INHACKEABLE CONFIG
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://webmail.hostingperu.com.pe;" always;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets for performance
    location /_next/static {
        proxy_cache_revalidate on;
        proxy_set_header Host $host;
        proxy_pass http://nextjs_upstream;
        expires 365d;
        access_log off;
    }

    location /public {
        proxy_cache_revalidate on;
        proxy_set_header Host $host;
        proxy_pass http://nextjs_upstream;
        expires 365d;
        access_log off;
    }
}

# Redirect non-www to www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name infosistel.com;
    
    ssl_certificate /etc/letsencrypt/live/www.infosistel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.infosistel.com/privkey.pem;

    return 301 https://www.infosistel.com$request_uri;
}
