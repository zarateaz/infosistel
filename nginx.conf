# INFOSISTEL - Nginx Hardened Configuration
# Optimized for Next.js Standalone and Security

upstream nextjs_upstream {
    server localhost:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name infosistel.com www.infosistel.com;
    
    # Temporarily disabled redirect until SSL is configured
    # location / {
    #     return 301 https://www.infosistel.com$request_uri;
    # }

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

