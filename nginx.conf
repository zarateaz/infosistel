upstream nextjs_upstream {
    server localhost:3001;
}

# Servidor HTTP principal — funciona con IP y dominio sin SSL
server {
    listen 80;
    listen [::]:80;
    server_name _;   # acepta cualquier host: IP o dominio

    # Logs
    access_log /var/log/nginx/infosistel_access.log;
    error_log  /var/log/nginx/infosistel_error.log;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy principal → Next.js en puerto 3001
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Cache de assets estáticos de Next.js
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Archivos públicos
    location /public/ {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }
}
