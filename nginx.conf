# ── Rate Limiting Zones (in http context via conf.d) ──
# Login: max 5 requests/minute per IP (brute force protection)
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
# API general: max 60 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;
# Public pages: max 120 requests/minute per IP
limit_req_zone $binary_remote_addr zone=general_zone:20m rate=120r/m;

upstream nextjs_upstream {
    server localhost:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name infosistel.com.pe www.infosistel.com.pe;

    # Redirección global a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name infosistel.com.pe www.infosistel.com.pe;

    # ── SSL Certificates (Certbot) ──
    ssl_certificate           /etc/letsencrypt/live/infosistel.com.pe/fullchain.pem;
    ssl_certificate_key       /etc/letsencrypt/live/infosistel.com.pe/privkey.pem;
    
    # ── SSL Hardening ──
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── Logs ──
    access_log /var/log/nginx/infosistel_access.log;
    error_log  /var/log/nginx/infosistel_error.log warn;

    # ── Hide Nginx version ──
    server_tokens off;

    # ── Request body size limit (100MB for product images) ──
    client_max_body_size 100M;

    # ── Gzip Compression ──
    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Security Headers ──
    add_header X-Frame-Options            "SAMEORIGIN"                           always;
    add_header X-Content-Type-Options     "nosniff"                              always;
    add_header X-XSS-Protection           "1; mode=block"                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"      always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:;" always;

    # ── Block access to sensitive files ──
    location ~ /\.(env|git|sh|sql|log)$ { deny all; return 404; }

    # ── Static paths (Serve directly from /var/www for permissions) ──
    location /_next/static/ {
        alias /var/www/infosistel/static/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /uploads/ {
        alias /var/www/infosistel/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location ^~ /img/ {
        alias /var/www/infosistel/public/img/;
        expires 30d;
    }

    # ── Proxy to Next.js ──
    location / {
        limit_req zone=general_zone burst=30 nodelay;
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

