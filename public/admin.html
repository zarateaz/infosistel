<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infosistel - Portal Administrativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
        }
        .login-box {
            width: 100%;
            max-width: 450px;
            padding: 50px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
        }
        .security-badge {
            width: 60px;
            height: 60px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--accent);
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="security-badge">
                <i class="fas fa-lock"></i>
            </div>
            <h2 style="text-align: center; color: var(--primary); margin-bottom: 8px;">Portal Interno</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 35px;">Ingrese sus credenciales para continuar</p>
            
            <form id="loginForm">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 8px;">Usuario</label>
                    <input type="text" id="username" placeholder="Usuario administrador" required style="width:100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-light);">
                </div>
                <div style="margin-bottom: 30px;">
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 8px;">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required style="width:100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-light);">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 0.95rem;">Iniciar Sesión</button>
            </form>
            
            <div id="loginError" style="color: #ef4444; margin-top: 20px; font-size: 0.85rem; text-align: center; display: none;">
                <i class="fas fa-circle-exclamation"></i> Usuario o contraseña incorrectos.
            </div>
            
            <div style="margin-top: 35px; text-align: center; border-top: 1px solid var(--border-light); padding-top: 20px;">
                <a href="/" style="color: var(--text-muted); text-decoration:none; font-size: 0.85rem; font-weight: 500;">
                    <i class="fas fa-arrow-left"></i> Volver al sitio web
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/admin.js"></script>
</body>
</html>
